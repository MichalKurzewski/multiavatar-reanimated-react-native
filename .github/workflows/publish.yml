name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://npm.pkg.github.com"
          scope: "@michalkurzewski"
      - name: Install peer + dev deps for type-check
        run: |
          npm install --no-save \
            react react-native @rive-app/react-native react-native-svg zustand \
            @types/react typescript
      - name: Type-check
        run: npx tsc --noEmit
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
